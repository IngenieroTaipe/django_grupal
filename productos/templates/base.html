<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - {{ titulo_pagina }}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Tienda es una demo construida con Django 5.x y el patrón MTV utilizando estilos clásicos y limpios.">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos CSS Simples y Clásicos (Claros: Blanco, Negro, Azul, Rojo) -->
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --text-muted: #4b5563;
            --primary-blue: #0252cc;
            --primary-blue-hover: #013da0;
            --accent-red: #d32f2f;
            --border-color: #e5e7eb;
            --card-bg: #f9fafb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary-blue);
        }

        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
            padding: 2.5rem 1.5rem;
        }

        /* Paneles y Tarjetas */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .hero {
            background: #f0f4ff;
            border: 1px solid #d0e0fc;
        }

        .hero-title {
            font-size: 2.2rem;
            margin: 0 0 0.8rem 0;
            color: var(--text-color);
        }

        .hero-subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-blue);
            color: #ffffff;
            padding: 0.65rem 1.25rem;
            border-radius: 0.25rem;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--primary-blue-hover);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #f3f4f6;
        }

        /* Grid de Estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 0.25rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        /* Grid del Catálogo */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: border-color 0.2s ease;
        }

        .product-card:hover {
            border-color: var(--primary-blue);
        }

        .product-img-container {
            height: 180px;
            position: relative;
            background-color: #f3f4f6;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-price-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background-color: var(--accent-red);
            color: #ffffff;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.85rem;
        }

        .product-content {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }

        .product-description {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 1.25rem;
            flex: 1;
        }

        .product-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 0.5rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
        }

        footer {
            background-color: #ffffff;
            border-top: 1px solid var(--border-color);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .badge-django {
            background-color: #f3f4f6;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="{% url 'productos:home' %}" class="logo">
                <i data-lucide="store" style="color: var(--primary-blue);"></i>
                Tienda
            </a>
            <nav>
                <ul class="nav-links">
                    <li>
                        <a href="{% url 'productos:home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                            Inicio
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'productos:catalogo' %}" class="nav-link {% if request.resolver_match.url_name == 'catalogo' %}active{% endif %}">
                            Catálogo
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <div>&copy; 2026 Tienda. Todos los derechos reservados.</div>
        <div style="margin-top: 0.5rem;">
            Desarrollado con 
            <span class="badge-django">Django 5.x MTV</span>
        </div>
    </footer>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
